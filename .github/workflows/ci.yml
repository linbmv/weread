name: CI
on:
  pull_request:
    branches: main
  push:
    branches: main
jobs:
  lint:
    if: github.repository == 'ranuts/weread'
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node_version: [24.15.0]
      fail-fast: false
    name: "Build&Test: node-${{ matrix.node_version }}, ${{ matrix.os }}"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        id: pnpm-install
        with:
          version: 11.1.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: pnpm

      - name: prepare
        run: pnpm pre

      - name: Install deps
        run: pnpm install

      - name: format
        run: pnpm run format

      - name: Lint
        run: pnpm run lint
